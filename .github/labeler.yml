components:
  - src/components/**

hooks:
  - src/hooks/**

testing:
  - src/**/*.test.ts
  - src/**/*.test.tsx
  - src/test/**

styles:
  - src/**/*.styles.ts
  - src/**/*.styles.tsx
  - src/Global.styles.ts

api:
  - src/API.ts
  - src/API.test.ts

javascript:
  - src/**/*.ts
  - src/**/*.tsx

dependencies:
  - package.json
  - package-lock.json
  - yarn.lock

github_actions:
  - .github/**

documentation:
  - README.md
  - CHANGELOG.md
  - LICENSE

configuration:
  - tsconfig.json
  - tsconfig.node.json
  - tsconfig.test.json
  - eslint.config.js
  - vite.config.ts
  - vercel.json
  - index.html

build:
  - dist/**
  - vite.config.ts

images:
  - src/images/**
  - public/**
